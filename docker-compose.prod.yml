services:
  # ── PostgreSQL Database ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulefeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulefeed123}
      POSTGRES_DB: ${POSTGRES_DB:-pulefeed}
    volumes:
      - pulefeed_db_data:/var/lib/postgresql/data
    networks:
      - internal
    # No ports exposed to host — app talks to db via internal network

  # ── Next.js + Payload CMS App ─────────────────────────────────────
  app:
    image: pulefeed:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-pulefeed}:${POSTGRES_PASSWORD:-pulefeed123}@db:5432/${POSTGRES_DB:-pulefeed}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Pulefeed}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID}
    networks:
      - internal
      - web

  # ── Nginx Reverse Proxy + SSL ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - web

  # ── Certbot (Let's Encrypt SSL) ───────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run manually: docker compose run --rm certbot certonly ...
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  pulefeed_db_data:
  certbot_www:
  certbot_certs:
